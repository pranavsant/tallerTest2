version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Overseer AI — Docker Compose
#
# Usage:
#   cp .env.example .env        # fill in secrets
#   docker compose up --build
#
# Services boot order:
#   db (healthy) → migrate (exit 0) → api (healthy) → frontend
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-overseer_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - overseer_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-overseer_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Database migrations ────────────────────────────────────────────────────
  # One-shot service: runs migrations then exits. Other services wait for it.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: "no"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-overseer_ai}
    command: ["python", "-m", "migrations.run"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - overseer_net

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # Override DATABASE_URL to use the internal Docker hostname
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-overseer_ai}
      # Allow cross-origin requests from the frontend container and host browser
      ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - overseer_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        # Baked into the Next.js bundle at build time (NEXT_PUBLIC_*)
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - overseer_net

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Internal network ───────────────────────────────────────────────────────────
networks:
  overseer_net:
    driver: bridge
