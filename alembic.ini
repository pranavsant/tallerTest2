# Alembic configuration — Overseer AI
# See: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Truncate revision slug at this length
truncate_slug_length = 40

# Timezone to use when rendering the date within the migration file
# Leave empty to use UTC
timezone = UTC

# sys.path path, will be prepended to sys.path if present
# defaults to the current working directory
prepend_sys_path = .

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
version_locations = %(here)s/alembic/versions

# The output encoding used when revision files are written from
# script.py.mako; defaults to utf-8.
output_encoding = utf-8

# Database URL — overridden at runtime from DATABASE_URL env var in env.py
sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/overseer_ai


[post_write_hooks]
# Uncomment to run ruff after each revision is generated:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
