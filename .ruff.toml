# Ruff configuration (mirrors pyproject.toml, for editors that look here)
target-version = "py311"
line-length = 100

[lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "N"]
ignore = ["E501", "B008"]

[lint.isort]
known-first-party = ["src"]

[format]
quote-style = "double"
indent-style = "space"
